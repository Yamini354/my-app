<p>accounts works!</p>
<table>
    <thead>
        <tr>
            <th>Account Name</th>
            <th>Available Balance</th>
            <th>Account Number</th>
            <th>City</th>
            <th>Profie Picture</th>
            <th>IFSC Code</th>
            <th>ID</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let account of accounts">
            <td>{{account.account_name}}</td>
            <td>{{account.available_balance}}</td>
            <td>{{account.account_number}}</td>
            <td>{{account.city}}</td>
            <!-- <td>{{account.profie_picture}}</td> -->
             <td>
                <img [src]="account.profie_picture" alt="" width="100px" height="100px">
             </td>
            <td>{{account.ifsc_code}}</td>
            <td>{{account.id}}</td>
        </tr>
    </tbody>
</table>
